# render.yaml
services:
  - type: web
    name: techno-crm-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.api.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 2
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0