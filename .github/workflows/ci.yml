name: CI

on: [push, pull_request]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: techno_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-cov

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema
        run: cd db && psql "$DATABASE_URL" -f schema.sql
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/techno_test

      - name: Seed database
        run: python scripts/ci_seed_database.py
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/techno_test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-key
          SUPABASE_SERVICE_ROLE_KEY: test-key

      - name: Run core tests (finance + crm)
        run: pytest tests/test_finance.py tests/test_crm.py -v
        timeout-minutes: 10
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/techno_test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-key
          SUPABASE_SERVICE_ROLE_KEY: test-key
          TWILIO_ACCOUNT_SID: test-sid
          TWILIO_AUTH_TOKEN: test-token
          TWILIO_WHATSAPP_FROM: whatsapp:+00000000000
          GMAIL_SENDER_ADDRESS: test@test.com
          GMAIL_APP_PASSWORD: test-password
          CI: "true"


